# Builds the `infishark` CLI for every supported platform on a `v*` tag and publishes the binaries to the GitHub Release.
#
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux USB deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev

      - name: Build
        run: cargo build --release -p infishark-cli --target ${{ matrix.target }}

      - name: Package (Linux, macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "infishark-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" infishark

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/infishark.exe" -DestinationPath "infishark-${{ matrix.target }}.zip"

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          files: infishark-${{ matrix.target }}.*
